services:
  postgres:
    image: timescale/timescaledb-ha:pg18.1-ts2.23.0-all
    container_name: tracker_postgres
    environment:
      POSTGRES_DB: tracker
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - 5432:5432
    networks:
      - network
  redis:
    image: redis
    container_name: tracker_redis
    ports:
      - 6379:6379
    networks:
      - network

networks:
  network:
    driver: bridge
